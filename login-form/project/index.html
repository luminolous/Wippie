<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login</title>

  <style>
    :root{
      --bg-url: url("../assets/login-form-bg.jpg");
      --card: rgba(255,255,255,.86);
      --stroke: rgba(2, 132, 199, .25);
      --text: #0f172a;
      --muted: #64748b;
      --accent: #1aa7ff;
      --shadow: 0 18px 45px rgba(2, 6, 23, .18);
      --radius: 18px;
    }

    *{ box-sizing: border-box; }

    body{
      margin: 0;
      min-height: 100vh;
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Arial, "Noto Sans", "Helvetica Neue", sans-serif;
      color: var(--text);

      background:
        radial-gradient(900px 480px at 15% 0%, rgba(26,167,255,.25), transparent 60%),
        radial-gradient(900px 480px at 85% 0%, rgba(59,130,246,.18), transparent 60%),
        linear-gradient(rgba(2,6,23,.25), rgba(2,6,23,.25)),
        var(--bg-url);
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
    }

    .wrap{
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 28px 16px;
    }

    .card{
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--stroke);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      overflow: hidden;
      transform: translateY(6px);
      opacity: 0;
      animation: pop .45s ease-out forwards;
    }

    .top{
      padding: 22px 22px 10px;
    }

    .badge{
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: var(--muted);
      letter-spacing: .12em;
      text-transform: uppercase;
    }

    .dot{
      width: 10px; height: 10px;
      border-radius: 999px;
      background: var(--accent);
      box-shadow: 0 0 0 5px rgba(26,167,255,.18);
    }

    h1{
      margin: 10px 0 6px;
      font-size: 28px;
      letter-spacing: -.02em;
    }

    p{
      margin: 0 0 14px;
      color: var(--muted);
      line-height: 1.5;
      font-size: 14px;
    }

    form{
      padding: 0 22px 22px;
      display: grid;
      gap: 12px;
    }

    label{
      display: block;
      font-size: 13px;
      color: var(--muted);
      margin: 0 0 6px;
    }

    .field{
      background: rgba(255,255,255,.75);
      border: 1px solid rgba(2,132,199,.22);
      border-radius: 14px;
      padding: 10px 12px;
      display: flex;
      gap: 10px;
      align-items: center;
      transition: border-color .2s ease, box-shadow .2s ease;
    }

    .field:focus-within{
      border-color: rgba(26,167,255,.65);
      box-shadow: 0 0 0 4px rgba(26,167,255,.16);
    }

    input{
      border: 0;
      outline: none;
      background: transparent;
      width: 100%;
      font-size: 14px;
      color: var(--text);
    }

    .icon{
      width: 18px;
      height: 18px;
      opacity: .75;
      flex: 0 0 auto;
    }

    .toggle{
      border: 0;
      background: transparent;
      padding: 6px 8px;
      border-radius: 10px;
      cursor: pointer;
      color: var(--muted);
      transition: background .2s ease;
      flex: 0 0 auto;
    }
    .toggle:hover{ background: rgba(2,132,199,.10); }

    .actions{
      display: grid;
      gap: 10px;
      margin-top: 2px;
    }

    .btn{
      appearance: none;
      border: 0;
      border-radius: 14px;
      padding: 12px 14px;
      cursor: pointer;
      font-weight: 700;
      font-size: 14px;
      letter-spacing: .01em;
    }

    .btn-primary{
      background: linear-gradient(135deg, #1aa7ff, #3b82f6);
      color: white;
      box-shadow: 0 10px 26px rgba(26,167,255,.25);
      transition: transform .15s ease, filter .15s ease;
    }
    .btn-primary:hover{ transform: translateY(-1px); filter: brightness(1.02); }
    .btn-primary:active{ transform: translateY(0px); }

    .helper{
      display:flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      font-size: 13px;
      color: var(--muted);
    }

    .link{
      color: #0ea5e9;
      text-decoration: none;
      font-weight: 600;
    }
    .link:hover{ text-decoration: underline; }

    .footer{
      padding: 14px 22px 18px;
      border-top: 1px solid rgba(2,132,199,.18);
      color: rgba(100,116,139,.95);
      font-size: 12px;
    }

    @keyframes pop{
      to { opacity: 1; transform: translateY(0); }
    }

    @media (prefers-reduced-motion: reduce){
      .card{ animation: none; opacity: 1; transform: none; }
    }
  </style>
</head>

<body>
  <main class="wrap">
    <section class="card" aria-label="Login form">
      <div class="top">
        <div class="badge"></span> Login</div>
        <h1>Welcome back</h1>
        <p>Input your username and password</p>
      </div>

      <form action="#" method="post">
        <div>
          <label for="username">Username</label>
          <div class="field">
            <svg class="icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M12 12a4 4 0 1 0-4-4 4 4 0 0 0 4 4Zm0 2c-4.42 0-8 2.24-8 5v1h16v-1c0-2.76-3.58-5-8-5Z" fill="currentColor"/>
            </svg>
            <input
              type="text"
              id="username"
              name="username"
              placeholder="example: luminolous"
              autocomplete="username"
              required
            />
          </div>
        </div>

        <div>
          <label for="password">Password</label>
          <div class="field">
            <svg class="icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M17 10V8a5 5 0 0 0-10 0v2H5v12h14V10h-2Zm-8 0V8a3 3 0 0 1 6 0v2H9Z" fill="currentColor"/>
            </svg>

            <input
              type="password"
              id="password"
              name="password"
              placeholder="••••••••"
              autocomplete="current-password"
              required
            />
          </div>
        </div>

        <div class="actions">
          <button class="btn btn-primary" type="submit">Login</button>

          <div class="helper">
            <a class="link" href="#" onclick="return false;">Forgot?</a>
          </div>
        </div>
      </form>
    </section>
  </main>
</body>
</html>
