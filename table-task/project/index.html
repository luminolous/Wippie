<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Task 2 | Table</title>

  <style>
    :root{
      --accent: rgb(33, 225, 255);
      --border: rgba(33, 225, 255, .35);
      --text: #0f172a;
      --muted: #64748b;
      --bg: #f6fbff;
      --card: #ffffff;
    }

    body{
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, "Noto Sans", "Helvetica Neue", sans-serif;
      /* background: radial-gradient(900px 400px at 15% 0%, rgba(33,225,255,.18), transparent 60%),
                  radial-gradient(900px 400px at 85% 0%, rgba(59,130,246,.14), transparent 60%),
                  var(--bg); */
      color: var(--text);
    }

    .page{
      max-width: 820px;
      margin: 48px auto;
      padding: 0 16px;
    }

    .title{
      margin: 0 0 10px;
      font-size: 24px;
      letter-spacing: .2px;
    }

    .subtitle{
      margin: 0 0 18px;
      color: var(--muted);
      line-height: 1.5;
    }

    .table-wrap{
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: 0 10px 30px rgba(2, 6, 23, .06);
      overflow-x: auto;
    }

    table{
      width: 100%;
      min-width: 520px;
      border-collapse: collapse;
    }

    caption{
      text-align: left;
      padding: 14px 16px;
      font-weight: 700;
      border-bottom: 1px solid var(--border);
    }

    thead th{
      background: rgba(33, 225, 255, .10);
      font-weight: 700;
    }

    th, td{
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
      white-space: nowrap;
    }

    tbody tr:nth-child(even){
      background: rgba(2, 132, 199, .04);
    }

    tbody tr:hover{
      background: rgba(33, 225, 255, .12);
    }

    .num{
      text-align: right;
      font-variant-numeric: tabular-nums;
    }
  </style>
</head>

<body>
  <main class="page">
    <h1 class="title">Student Marks</h1>
    <p class="subtitle">Example table with HTML + CSS</p>

    <div class="table-wrap">
      <table>
        <caption>Marks for Science Subjects</caption>

        <thead>
          <tr>
            <th scope="col" rowspan="2">Name</th>
            <th scope="colgroup" colspan="3">Mark</th>
          </tr>
          <tr>
            <th scope="col">Chemistry</th>
            <th scope="col">Physics</th>
            <th scope="col">Biology</th>
          </tr>
        </thead>

        <tbody>
          <tr>
            <th scope="row">Robby</th>
            <td class="num">76</td>
            <td class="num">80</td>
            <td class="num">81</td>
          </tr>
          <tr>
            <th scope="row">Rendi</th>
            <td class="num">84</td>
            <td class="num">70</td>
            <td class="num">75</td>
          </tr>
          <tr>
            <th scope="row">Alfian</th>
            <td class="num">96</td>
            <td class="num">70</td>
            <td class="num">71</td>
          </tr>
        </tbody>
      </table>
    </div>
  </main>
</body>
</html>
