<body>
    <header>
        <h1>SMA SEMEN PADANG</h1>

    <main>
        <section>
            <h2>Kontak Sekolah</h2>
            <p>Silakan isi form di bawah ini untuk menghubungi pihak sekolah.</p>

            <form action="#" method="post">
                <p>
                    <label for="nama">Nama:</label><br>
                    <input type="text" id="nama" name="nama" required>
                </p>

                <p>
                    <label for="email">Email:</label><br>
                    <input type="email" id="email" name="email" required>
                </p>

                <p>
                    <label for="pesan">Pesan:</label><br>
                    <textarea id="pesan" name="pesan" rows="6" cols="40" required></textarea>
                </p>

                <p>
                    <button type="submit">Kirim</button>
                </p>
            </form>
        </section>

        <section>
            <h2>Informasi Kontak</h2>
            <p>Alamat: Komplek Social Centre PT Semen Padang</p>
            <p>Email: sma@semenpadangschools.id</p>
            <p>Telepon: 081295591971</p>
        </section>
    </main>
